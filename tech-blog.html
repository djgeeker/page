<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Technical Blog</title>
    <link rel="stylesheet" href="./blog.css" />
  </head>
  <body class="tech-blog-page">
    <canvas class="motion-field" id="motionField" aria-hidden="true"></canvas>
    <div class="space simple-space" data-decorative-moon aria-hidden="true"></div>
    <div class="grid-field" aria-hidden="true"></div>
    <main class="simple-page">
      <section class="simple-panel markdown-panel">
        <p class="eyebrow">Technical Blog</p>
        <h1 data-markdown-page-title>Markdown</h1>
        <p class="markdown-meta" data-markdown-page-meta></p>
        <nav class="post-scroll" data-post-timeline aria-label="Technical blog posts"></nav>
        <nav class="markdown-toc" data-markdown-page-toc aria-label="Article table of contents"></nav>
        <article
          class="markdown-body"
          data-markdown-article
        ></article>
        <a class="back-link" href="./blog.html">Back to About Me</a>
      </section>
    </main>
    <script type="module" src="./tech-blog.js"></script>
    <script src="./blog.js"></script>
  </body>
</html>
