<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Technical Blog</title>
    <link rel="stylesheet" href="./blog.css" />
  </head>
  <body class="tech-blog-page" data-posts-api="./api/tech-posts" data-index-page="./tech-blog.html" data-detail-page="./tech-post.html" data-default-post="20260601-markdown-render-demo">
    <canvas class="motion-field" id="motionField" aria-hidden="true"></canvas>
    <div class="space simple-space" data-decorative-moon data-decorative-body="mars"></div>
    <div class="grid-field" aria-hidden="true"></div>
    <main class="simple-page">
      <section class="simple-panel markdown-panel post-index-panel">
        <p class="eyebrow">Technical Blog</p>
        <h1>Technical Notes</h1>
        <p class="markdown-meta">Posts are ordered by time. Select a node to open the article page.</p>
        <div class="tag-filter" data-tag-filter aria-label="Filter posts by tag"></div>
        <nav class="post-scroll" data-post-timeline aria-label="Technical blog posts"></nav>
        <a class="back-link" href="./blog.html">Back to About Me</a>
      </section>
    </main>
    <script type="module" src="./tech-blog.js"></script>
    <script src="./blog.js"></script>
  </body>
</html>
